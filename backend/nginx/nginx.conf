worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS — re-resolves service names on each request
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;

        # Auth and user management → api-gateway
        location /api/v1/auth/ {
            set $api_gateway http://api-gateway:3000;
            proxy_pass $api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            set $api_gateway http://api-gateway:3000;
            proxy_pass $api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin user management → api-gateway
        location /api/v1/admin/users {
            set $api_gateway http://api-gateway:3000;
            proxy_pass $api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI endpoints → ai-service
        location /api/v1/ai/ {
            set $ai_service http://ai-service:3002;
            proxy_pass $ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # SSE streaming ask (AI instructor) — must come before the generic /api/v1/ block
        location ~ ^/api/v1/nodes/[^/]+/ask/stream$ {
            set $learning_service http://learning-service:3001;
            proxy_pass $learning_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # SSE streaming explanation — must come before the generic /api/v1/ block
        location ~ ^/api/v1/nodes/[^/]+/explanation/stream$ {
            set $learning_service http://learning-service:3001;
            proxy_pass $learning_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Everything else → learning-service
        location /api/v1/ {
            set $learning_service http://learning-service:3001;
            proxy_pass $learning_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Swagger UIs
        location /docs/gateway/ {
            set $api_gateway http://api-gateway:3000;
            proxy_pass $api_gateway/api/docs/;
            proxy_set_header Host $host;
        }

        location /docs/learning/ {
            set $learning_service http://learning-service:3001;
            proxy_pass $learning_service/api/docs/;
            proxy_set_header Host $host;
        }

        location /docs/ai/ {
            set $ai_service http://ai-service:3002;
            proxy_pass $ai_service/api/docs/;
            proxy_set_header Host $host;
        }
    }
}
