worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway:3000;
    }

    upstream learning_service {
        server learning-service:3001;
    }

    upstream ai_service {
        server ai-service:3002;
    }

    server {
        listen 80;

        # Auth and user management → api-gateway
        location /api/v1/auth/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin user management → api-gateway
        location /api/v1/admin/users {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI endpoints → ai-service
        location /api/v1/ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Everything else → learning-service
        location /api/v1/ {
            proxy_pass http://learning_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Swagger UIs
        location /docs/gateway/ {
            proxy_pass http://api_gateway/api/docs/;
            proxy_set_header Host $host;
        }

        location /docs/learning/ {
            proxy_pass http://learning_service/api/docs/;
            proxy_set_header Host $host;
        }

        location /docs/ai/ {
            proxy_pass http://ai_service/api/docs/;
            proxy_set_header Host $host;
        }
    }
}
