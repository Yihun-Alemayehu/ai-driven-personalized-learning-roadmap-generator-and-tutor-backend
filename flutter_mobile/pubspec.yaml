name: flutter_mobile
description: Atlas adaptive learning mobile client
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.8.0+1

  # Forms
  flutter_form_builder: ^10.0.1

  # Graph and charts
  graphview: ^1.3.1
  fl_chart: ^0.69.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Typography
  google_fonts: ^6.3.1

  # UI utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1

  # Icons
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
